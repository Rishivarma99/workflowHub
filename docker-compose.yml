# Development: hot-reload Angular dev server on http://localhost:4290
# API URL comes from .env.docker → API_PROXY_TARGET (see .env.docker.example).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4290:4290"
    env_file:
      - .env.docker
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  web_node_modules:
