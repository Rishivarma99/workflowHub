<div class="wh-app">
  <div class="shell flex min-h-0 flex-1">
    <wh-workflows-sidebar
      [user]="user()"
      (createWorkflow)="onCreateWorkflow()"
      (openSettings)="onOpenSettings()"
    />

    <div class="col flex min-w-0 flex-1 flex-col pt-14 lg:pt-16">
      <wh-workflows-topbar
        [user]="user()"
        (openSettings)="onOpenSettings()"
        (signOut)="onSignOut()"
      />

      <main class="content min-w-0 flex-1 pb-[calc(4.125rem+env(safe-area-inset-bottom))] sm:pb-0">
        <router-outlet />
      </main>
    </div>
  </div>

  <wh-workflows-tabbar (createWorkflow)="onCreateWorkflow()" />
</div>
