<nav class="tabbar" aria-label="Main">
  @for (tab of tabs; track tab.id) {
    @if (tab.id === 'create') {
      <button type="button" class="create-tab" (click)="createWorkflow.emit()">
        <span class="tb-dot"><wh-icon name="plus" [size]="20" /></span>
        {{ tab.label }}
      </button>
    } @else {
      <a class="tab-link" [routerLink]="tab.path" routerLinkActive="on">
        <span class="tb-dot"><wh-icon [name]="tab.icon" [size]="21" /></span>
        {{ tab.label }}
      </a>
    }
  }
</nav>
