<header
  class="topbar fixed inset-x-0 top-0 z-[var(--z-shell-chrome)] flex min-h-14 items-center gap-3 px-4 lg:left-[15.5rem] lg:min-h-16 lg:px-7"
>
  <div class="tb-brand">
    <span class="tb-mark"><wh-icon name="terminal-square" [size]="15" /></span>
    Workflow Hub
  </div>

  <nav class="topbar-nav" aria-label="Registry">
    @for (item of nav; track item.id) {
      <a class="topbar-link" [routerLink]="item.path" routerLinkActive="on">{{ item.label }}</a>
    }
  </nav>

  <div class="tb-spacer"></div>

  <button type="button" class="tb-icon" aria-label="Notifications">
    <wh-icon name="bell" [size]="18" />
  </button>

  <div class="tb-user">
    <button type="button" class="tb-user-btn" (click)="openSettings.emit()" title="Profile &amp; settings">
      <wh-avatar
        [name]="user().name"
        [size]="30"
        [color]="user().avatarColor"
        [imageUrl]="user().avatarUrl ?? null"
      />
      <span class="tb-user-name">{{ user().name }}</span>
    </button>
    <button type="button" class="tb-icon tb-logout" (click)="signOut.emit()" title="Log out">
      <wh-icon name="log-out" [size]="18" />
    </button>
  </div>
</header>
